# docker-compose.override.yml
# Agrega el scheduler, la API y el dashboard al servicio PostGIS del compose base.
# Uso: docker compose up -d --build

services:

  scheduler:
    build: ./scheduler
    container_name: geogame_scheduler
    env_file:
      - .env
    environment:
      CF_TOKEN: ${CF_TOKEN}
      POSTGRES_HOST: geogame_postgis
      POSTGRES_PORT: "5432"
      POSTGRES_DB: magedb
      POSTGRES_USER: mageuser
      POSTGRES_PASSWORD: magepass
    restart: unless-stopped
    depends_on:
      - postgis

  geogame_api:
    build: ./api
    container_name: geogame_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://mageuser:magepass@geogame_postgis:5432/magedb
    restart: unless-stopped
    depends_on:
      - postgis

  geogame_dashboard:
    build: ./dashboard
    container_name: geogame_dashboard
    ports:
      - "8501:8501"
    environment:
      API_URL: http://geogame_api:8000
    restart: unless-stopped
    depends_on:
      - geogame_api

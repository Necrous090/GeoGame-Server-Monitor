# docker-compose.override.yml
# Reemplaza Mage AI con un scheduler Python simple (APScheduler).
# Coloca este archivo junto a docker-compose.yaml y corre:
#   docker compose up -d --build

services:

  # Scheduler Python — reemplaza Mage AI
  scheduler:
    build: ./scheduler
    container_name: geogame_scheduler
    environment:
      CF_TOKEN: ${CF_TOKEN}
      POSTGRES_HOST: geogame_postgis
      POSTGRES_PORT: "5432"
      POSTGRES_DB: magedb
      POSTGRES_USER: mageuser
      POSTGRES_PASSWORD: magepass
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - postgis

  geogame_api:
    build: ./api
    container_name: geogame_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://mageuser:magepass@geogame_postgis:5432/magedb
    env_file:
      - .env
    restart: unless-stopped

  geogame_dashboard:
    build: ./dashboard
    container_name: geogame_dashboard
    ports:
      - "8501:8501"
    environment:
      API_URL: http://geogame_api:8000
    restart: unless-stopped

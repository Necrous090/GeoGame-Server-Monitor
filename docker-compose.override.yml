# docker-compose.override.yml
#
# Docker Compose fusiona este archivo con docker-compose.yaml automáticamente.
# No es necesario modificar el compose original.
#
# Coloca este archivo en el mismo directorio que docker-compose.yaml (GeoGame/)
# y luego: docker compose up -d --build
#
# Accesos tras levantar:
#   FastAPI  → http://localhost:8000
#   Swagger  → http://localhost:8000/docs
#   Streamlit → http://localhost:8501

services:

  geogame_api:
    build: ./api
    container_name: geogame_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://mageuser:magepass@geogame_postgis:5432/magedb
    env_file:
      - .env
    restart: unless-stopped

  geogame_dashboard:
    build: ./dashboard
    container_name: geogame_dashboard
    ports:
      - "8501:8501"
    environment:
      API_URL: http://geogame_api:8000
    restart: unless-stopped
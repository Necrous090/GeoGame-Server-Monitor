services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: geogame_postgis
    environment:
      POSTGRES_USER: mageuser
      POSTGRES_PASSWORD: magepass
      POSTGRES_DB: magedb
    ports:
      - "65432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  postgres_data: